name: Daily Job Hunt

on:
  schedule:
    - cron: "0 5 * * *"   # runs every day at 5:00 AM UTC (7:00 AM Germany, arrives ~7-8 AM)
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.email "sheroo16.ali@gmail.com"
          git config user.name "SherwanAli0"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
