# ─────────────────────────────────────────────────────────────────────────────
#  ROLLBACK ONLY — the pipeline now runs on AWS ECS Fargate.
#
#  Migrated 2026-07-20 after source parity was verified: 8,948 postings from
#  Fargate against a 8,901 GitHub baseline, no source regressed.
#  Live schedule: EventBridge `job-hunter-morning` / `-afternoon`,
#  07:00 and 15:00 Europe/Berlin (this cron was UTC-only and DST-naive).
#
#  This workflow is DISABLED, not deleted. To roll back:
#    gh workflow enable "Daily Job Hunt"
#    aws scheduler update-schedule --name job-hunter-morning   ... --state DISABLED
#    aws scheduler update-schedule --name job-hunter-afternoon ... --state DISABLED
#
#  NOTE: state diverged at migration. This workflow reads seen_jobs.json from
#  the repo; AWS reads s3://job-hunter-state-278371786270/state/. After a
#  rollback the first run may re-send jobs AWS has already shown you.
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Job Hunt

on:
  schedule:
    # Two runs per day so we catch fresh postings before the LinkedIn pile-up.
    # GitHub cron is UTC and DST-naive — Berlin is UTC+1 (winter) / UTC+2 (summer).
    - cron: "0 5 * * *"   # ~7 AM Berlin (winter) / ~7 AM (summer) → morning digest
    - cron: "0 13 * * *"  # ~2 PM Berlin (winter) / ~3 PM (summer) → afternoon refresh
  workflow_dispatch:        # lets you trigger it manually from GitHub

# Never run two hunts at once — a manual run colliding with a cron run makes
# the loser's seen_jobs.json push fail (non-fast-forward). Queue instead.
concurrency:
  group: daily-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Personal data never lives in this public repo. The answer bank is kept
      # between runs via the Actions cache; the application tracker arrives via
      # a repo secret (track.py syncs it up with `gh secret set` locally).
      - name: Restore answer bank (private, cached — never committed)
        uses: actions/cache@v4
        with:
          path: answers.json
          key: answers-bank-${{ github.run_id }}
          restore-keys: |
            answers-bank-

      - name: Restore application tracker from secret
        env:
          APPLIED_JOBS_JSON: ${{ secrets.APPLIED_JOBS }}
        run: |
          if [ -n "$APPLIED_JOBS_JSON" ]; then
            printf '%s' "$APPLIED_JOBS_JSON" > applied_jobs.json
          fi

      - name: Run job hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          # Optional — scraper is a graceful no-op if these aren't set.
          # Sign up at developer.adzuna.com (free, 1000 calls/month) to enable
          # coverage of Mercedes-Benz, BMW, Allianz, Deutsche Bank, P&G,
          # Unilever, and other companies whose sites are Cloudflare-blocked.
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # Personal fact sheet for screening-answer drafting (repo is public,
          # so the facts live only in this secret / a gitignored local file).
          APPKIT_FACTS: ${{ secrets.APPKIT_FACTS }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.email "sheroo16.ali@gmail.com"
          git config user.name "SherwanAli0"
          git add seen_jobs.json run_stats.jsonl
          git diff --cached --quiet || {
            git commit -m "chore: update seen jobs [skip ci]"
            # Every historical red ❌ on this workflow died right here, AFTER
            # the digest email was already sent: a commit landing on main
            # mid-run (fetch first), a transient GitHub 500, a credentials
            # hiccup. Retry with a rebase between attempts so a bookkeeping
            # push never marks a successful hunt as failed.
            ok=""
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then ok=1; break; fi
              echo "push attempt $i failed; retrying in 20s"
              sleep 20
            done
            [ -n "$ok" ]
          }
