name: Calibrate scorer

# Manual only — the LLM layer costs ~EUR 0.07/run. Run it before merging any
# edit to the scoring prompt in scorer.py, and compare band accuracy.
on:
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calibration (pre-screen + LLM band accuracy)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python calibrate.py
